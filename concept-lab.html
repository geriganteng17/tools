<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Lab — Static Ad Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@700&family=Luckiest+Guy&family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700;800;900&family=DM+Serif+Display&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1d2025;color:#e7eaee;font-family:'Nunito',sans-serif;padding:28px 18px 60px;max-width:1000px;margin:0 auto}
  h1{font-size:22px;font-weight:900}
  h1 span{color:#ffd23f}
  .sub{color:#9aa3ad;font-size:13px;margin:4px 0 20px;line-height:1.5}
  label{display:block;font-size:12px;font-weight:800;color:#9aa3ad;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:#272b32;border:1.5px solid #3a4049;border-radius:20px;padding:7px 15px;font-size:13px;font-weight:800;cursor:pointer;color:#cdd6e0}
  .chip.on{border-color:#4f8ff7;color:#fff;background:#2d3640}
  .chip.draft::after{content:" ·draft";color:#e6a23c;font-size:10px}
  .rules{margin-top:10px;font-size:12.5px;color:#e6a23c;font-weight:700;min-height:18px}
  .bar{display:flex;gap:10px;align-items:center;margin-top:18px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:8px;background:#e63d2f;color:#fff;border:none;border-radius:24px;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;padding:11px 24px;cursor:pointer}
  .btn:hover{filter:brightness(1.1)}
  .btn.sec{background:#272b32;border:1.5px solid #3a4049;font-size:13px}
  .grid{display:flex;flex-wrap:wrap;gap:18px;margin-top:22px;justify-content:center}
  .slot{display:flex;flex-direction:column;gap:8px;align-items:center}
  .tagline{font-size:11.5px;font-weight:900;color:#9aa3ad}
  .card{position:relative;width:270px;height:480px;border-radius:10px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.45)}
  .slotbtns{display:flex;gap:6px}
  .mini{background:#272b32;border:1.5px solid #3a4049;border-radius:14px;color:#cdd6e0;font-family:'Nunito',sans-serif;font-weight:800;font-size:11.5px;padding:5px 12px;cursor:pointer}
  .mini:hover{border-color:#4f8ff7}
  .ph{position:absolute;inset:0;background:linear-gradient(160deg,#9fb98f,#5b7d4e);background-size:cover;background-position:center}
  .doodle{position:absolute;font-size:22px;filter:drop-shadow(0 2px 3px #0006);z-index:6}
  .cta{position:absolute;left:50%;transform:translateX(-50%);bottom:22px;font-weight:900;font-size:13px;padding:10px 22px;border-radius:22px;z-index:7;white-space:nowrap}
  .chiplogo{position:absolute;top:12px;right:12px;border-radius:5px;padding:3px 8px;font-weight:900;font-size:9.5px;z-index:8;box-shadow:0 2px 5px #0004;background:#fff}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2d3640;border:1.5px solid #4f8ff7;color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:800;display:none;z-index:99}
</style>
</head>
<body>
  <h1>🧪 CONCEPT <span>LAB</span></h1>
  <p class="sub">Mockup generator buat static ads — pilih brand + angle, shuffle layout & copy sampe nemu yang klik. Zero API, semua lokal. Foto bisa di-drop biar kebayang beneran. Brand bertanda <b style="color:#e6a23c">draft</b> = palette tebakan, kalibrasi pakai static asli.</p>

  <label>Brand</label>
  <div class="chips" id="brands"></div>
  <div class="rules" id="rules"></div>

  <div class="bar">
    <div style="flex:1;min-width:180px">
      <label style="margin-top:0">Angle</label>
      <div class="chips" id="angles"></div>
    </div>
  </div>

  <div class="bar">
    <button class="btn" onclick="shuffleAll()">🎲 Shuffle semua</button>
    <button class="btn sec" onclick="document.getElementById('photo').click()">🖼 Pakai foto (lokal)</button>
    <input type="file" id="photo" accept="image/*" style="display:none">
    <span style="font-size:12px;color:#7c8590" id="phName"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="toast" id="toast"></div>

  wonderworld:{name:'WonderWorld',draft:false,rules:'✅ faces keliatan OK di static · ⭐SIG: bubble font lilac outline putih, headline TOP, CTA pill kuning kecil, gem/sparkle · dari Static 15 asli',
    bg:'linear-gradient(165deg,#bfe3f5,#8ec9ec)',headFont:"'Baloo 2',cursive",headColor:'#fff',headShadow:'2.5px 2.5px 0 rgba(50,100,160,.45)',accent:'#b89ae8',ctaBg:'#f5c542',ctaColor:'#1d3557',ctaBorder:'2px solid #fff',doodles:['💎','✨','⚡'],chipHtml:'<span style="color:#1b62b5">WONDER<span style="color:#ff7a3d">WORLD</span></span>',blockColor:'#8ec9ec',caseUpper:false,sig:['topbubble','fullbleed']},
  kreationkidz:{name:'Kreation Kidz',draft:false,rules:'⚠ dipegang Binh (bukan Bolo) · wajah SENSITIF (pernah diminta blur) · ⭐SIG: scrapbook botanical cream+sage+coral, polaroid miring, badge headline, CTA navy · dari static Binh 8 Jun',
    bg:'linear-gradient(160deg,#f6efe2,#ece1cb)',headFont:"'Fredoka',sans-serif",headColor:'#3a4d8f',headShadow:'none',accent:'#e2697f',ctaBg:'#2c3e6b',ctaColor:'#fff',ctaBorder:'none',doodles:['🌿','🌸','🦋'],chipHtml:'<span style="color:#e2697f">KREATION</span> <span style="color:#3a4d8f">KIDZ</span>',blockColor:'#9eb88a',caseUpper:true,sig:['botanical','polaroid']}

const LAYOUTS=['fullbleed','arch','diagonal','colorblock','sticker','torn','polaroid','banners','topbubble','minimal','botanical'];
let curBrand='kinderkare',curAngle='tour',slots=[{},{},{}];

function accentify(h,t){
  const ws=h.split(' ');
  let idx=0,len=0;
  ws.forEach((w,i)=>{if(w.length>len){len=w.length;idx=i}});
  return ws.map((w,i)=>i===idx?'<em style="color:'+t.accent+';font-style:normal">'+w+'</em>':w).join(' ');
}
function headHtml(t,h,size){
  const txt=t.caseUpper?h.toUpperCase():h;
  return '<div style="font-family:'+t.headFont+';color:'+t.headColor+';text-shadow:'+t.headShadow+';font-size:'+size+'px;line-height:1.12;position:relative;z-index:5">'+accentify(txt,t)+'</div>';
}
function subHtml(t,s,dark){
  return '<div style="font-family:\'Caveat\',cursive;font-weight:700;color:'+(dark||'#fff')+';font-size:16.5px;line-height:1.25;margin-top:8px;position:relative;z-index:5;opacity:.95">'+s+'</div>';
}
function ctaHtml(t,c){return '<div class="cta" style="background:'+t.ctaBg+';color:'+t.ctaColor+';border:'+t.ctaBorder+'">'+c+'</div>'}
function chipHtml(t){return '<div class="chiplogo">'+t.chipHtml+'</div>'}
function doodles(t,p1,p2){return '<span class="doodle" style="'+p1+'">'+t.doodles[0]+'</span><span class="doodle" style="'+p2+'">'+t.doodles[1]+'</span>'}
function phStyle(){return photoURL?'background-image:url('+photoURL+')':''}

const RENDER={
  fullbleed:(t,c)=>'<div class="ph" style="'+phStyle()+'"></div><div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(0,0,0,.72));z-index:2"></div>'+chipHtml(t)+doodles(t,'top:16px;left:14px','bottom:88px;right:16px')+'<div style="position:absolute;left:18px;right:18px;bottom:70px;z-index:5">'+headHtml(t,c.h,26)+subHtml(t,c.s)+'</div>'+ctaHtml(t,c.cta),
  arch:(t,c)=>'<div style="position:absolute;inset:0;background:'+t.bg+'"></div>'+chipHtml(t)+doodles(t,'top:18px;left:16px','top:46%;right:14px')+'<div style="position:absolute;top:54px;left:35px;right:35px;height:240px;border-radius:110px 110px 14px 14px;overflow:hidden;border:5px solid #fff;box-shadow:0 8px 20px #0005;z-index:4"><div class="ph" style="'+phStyle()+'"></div></div><div style="position:absolute;left:18px;right:18px;top:312px;text-align:center;z-index:5">'+headHtml(t,c.h,22)+subHtml(t,c.s)+'</div>'+ctaHtml(t,c.cta),
  diagonal:(t,c)=>'<div style="position:absolute;inset:0;background:'+t.bg+'"></div><div style="position:absolute;inset:0;clip-path:polygon(0 0,100% 0,100% 46%,0 60%);overflow:hidden;z-index:3"><div class="ph" style="'+phStyle()+'"></div></div>'+chipHtml(t)+doodles(t,'top:52%;left:14px','bottom:92px;right:16px')+'<div style="position:absolute;left:18px;right:18px;bottom:78px;z-index:5">'+headHtml(t,c.h,24)+subHtml(t,c.s)+'</div>'+ctaHtml(t,c.cta),
  colorblock:(t,c)=>'<div style="position:absolute;inset:0;background:'+t.bg+'"></div><div style="position:absolute;left:0;right:0;bottom:0;height:52%;overflow:hidden;z-index:3"><div class="ph" style="'+phStyle()+'"></div></div>'+chipHtml(t)+doodles(t,'top:40%;left:14px','top:14px;left:16px')+'<div style="position:absolute;left:18px;right:18px;top:46px;z-index:5">'+headHtml(t,c.h,24)+subHtml(t,c.s)+'</div>'+ctaHtml(t,c.cta),
  sticker:(t,c)=>'<div style="position:absolute;inset:0;background:'+t.bg+'"></div>'+chipHtml(t)+doodles(t,'top:20px;left:16px','bottom:120px;left:18px')+'<span class="doodle" style="top:60px;right:20px">'+(t.doodles[2]||'✦')+'</span><div style="position:absolute;top:84px;left:50%;transform:translateX(-50%) rotate(-3deg);width:190px;height:190px;border-radius:50%;overflow:hidden;border:6px solid #fff;box-shadow:0 10px 22px #0005;z-index:4"><div class="ph" style="'+phStyle()+'"></div></div><div style="position:absolute;left:16px;right:16px;top:296px;text-align:center;z-index:5">'+headHtml(t,c.h,22)+subHtml(t,c.s)+'</div>'+ctaHtml(t,c.cta),
  torn:(t,c)=>'<div style="position:absolute;inset:0;background:'+t.bg+'"></div>'+chipHtml(t)+'<div style="position:absolute;left:18px;right:18px;top:44px;z-index:5">'+headHtml(t,c.h,23)+'</div><div style="position:absolute;left:0;right:0;top:170px;height:175px;overflow:hidden;clip-path:polygon(0 6%,7% 0,17% 5%,28% 1%,40% 6%,52% 1%,63% 5%,75% 0,86% 5%,95% 1%,100% 6%,100% 94%,93% 100%,82% 95%,70% 99%,58% 94%,47% 99%,35% 95%,24% 100%,12% 95%,0 99%);z-index:4"><div class="ph" style="'+phStyle()+'"></div></div>'+doodles(t,'top:150px;right:14px','bottom:96px;left:16px')+'<div style="position:absolute;left:18px;right:18px;top:360px;z-index:5">'+subHtml(t,c.s)+'</div>'+ctaHtml(t,c.cta),
  polaroid:(t,c)=>'<div style="position:absolute;inset:0;background:'+t.bg+'"></div>'+chipHtml(t)+doodles(t,'top:18px;left:16px','bottom:100px;right:14px')+'<div style="position:absolute;top:64px;left:50%;transform:translateX(-50%) rotate(-2.5deg);width:200px;background:#fff;padding:9px 9px 30px;box-shadow:0 10px 22px #0005;z-index:4"><div style="height:200px;overflow:hidden"><div class="ph" style="position:relative;height:100%;'+phStyle()+'"></div></div></div><div style="position:absolute;left:16px;right:16px;top:330px;text-align:center;z-index:5">'+headHtml(t,c.h,21)+subHtml(t,c.s)+'</div>'+ctaHtml(t,c.cta),
  banners:(t,c)=>{
    const ws=c.h.split(' '),mid=Math.ceil(ws.length/2);
    const l1=ws.slice(0,mid).join(' '),l2=ws.slice(mid).join(' ');
    const b1=t.banner1||t.blockColor,b2=t.banner2||t.ctaBg;
    return '<div class="ph" style="'+phStyle()+'"></div><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.18) 0%,transparent 28%,transparent 55%,'+t.blockColor+'cc 100%);z-index:2"></div>'+chipHtml(t)
    +'<div style="position:absolute;top:36px;left:16px;z-index:5"><div style="display:inline-block;background:'+b1+';color:#fff;font-weight:900;font-size:17px;padding:6px 14px;transform:rotate(-4deg);box-shadow:0 4px 10px #0004">'+l1+'</div><br><div style="display:inline-block;background:'+b2+';color:#fff;font-weight:900;font-size:17px;padding:6px 14px;transform:rotate(-2deg);margin:6px 0 0 14px;box-shadow:0 4px 10px #0004">'+l2+'</div></div>'
    +'<div style="position:absolute;left:16px;bottom:26px;max-width:140px;font-size:10.5px;font-weight:800;color:#fff;line-height:1.3;z-index:5;opacity:.95">'+c.s+'</div>'
    +'<div style="position:absolute;right:12px;bottom:24px;background:'+t.ctaBg+';color:'+t.ctaColor+';border:'+t.ctaBorder+';font-weight:900;font-size:10.5px;padding:7px 13px;border-radius:18px;z-index:6">▶ '+c.cta+'</div>'},
  topbubble:(t,c)=>{
    const ws=c.h.split(' ');let idx=0,len=0;ws.forEach((w,i)=>{if(w.length>len){len=w.length;idx=i}});
    const pre=ws.filter((w,i)=>i!==idx).join(' '),big=ws[idx];
    return '<div class="ph" style="'+phStyle()+'"></div><div style="position:absolute;inset:0;background:linear-gradient(180deg,'+t.blockColor+'b8 0%,transparent 38%);z-index:2"></div>'+chipHtml(t)
    +'<div style="position:absolute;top:34px;left:14px;right:14px;text-align:center;z-index:5"><div style="font-family:'+t.headFont+';font-weight:800;color:#fff;font-size:19px;text-shadow:'+t.headShadow+'">'+pre+'</div><div style="font-family:'+t.headFont+';font-weight:800;color:'+t.accent+';font-size:34px;line-height:1;text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,0 6px 14px rgba(0,0,0,.25)">'+big+'</div><div style="font-size:10.5px;font-weight:800;color:#fff;margin-top:5px;text-shadow:0 1px 6px rgba(0,0,0,.5)">'+c.s+'</div></div>'
    +doodles(t,'top:30px;right:18px','top:120px;left:16px')
    +'<div style="position:absolute;left:50%;transform:translateX(-50%);bottom:26px;background:'+t.ctaBg+';color:'+t.ctaColor+';border:'+t.ctaBorder+';font-weight:900;font-size:11px;padding:8px 16px;border-radius:18px;z-index:6">'+c.cta.toUpperCase()+'</div>'},
  minimal:(t,c)=>'<div class="ph" style="'+phStyle()+'"></div><div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 42%,rgba(20,12,4,.78));z-index:2"></div>'+chipHtml(t)
    +'<div style="position:absolute;left:20px;right:20px;bottom:64px;text-align:center;z-index:5"><div style="display:inline-block;background:'+t.ctaBg+';color:'+t.ctaColor+';font-weight:900;font-size:9.5px;letter-spacing:.08em;padding:5px 13px;border-radius:14px;margin-bottom:11px">'+c.cta.toUpperCase()+'</div>'+headHtml(t,c.h,25)+'<div style="font-size:11px;font-weight:700;color:#f2e8d8;margin-top:7px;opacity:.92">'+c.s+'</div></div>'
    +doodles(t,'bottom:24px;left:18px','bottom:26px;right:18px'),
  botanical:(t,c)=>'<div style="position:absolute;inset:0;background:'+t.bg+'"></div>'
    +'<span style="position:absolute;top:-8px;left:-10px;font-size:54px;opacity:.55;transform:rotate(20deg);z-index:1">🌿</span><span style="position:absolute;bottom:48px;right:-8px;font-size:48px;opacity:.55;transform:rotate(-15deg);z-index:1">🌸</span><span style="position:absolute;bottom:120px;left:-6px;font-size:40px;opacity:.5;z-index:1">🌼</span>'+chipHtml(t)
    +'<div style="position:absolute;top:46px;left:50%;transform:translateX(-50%) rotate(-2.5deg);width:186px;background:#fff;padding:8px 8px 22px;box-shadow:0 8px 18px #0003;z-index:3"><div style="height:150px;overflow:hidden"><div class="ph" style="position:relative;height:100%;'+phStyle()+'"></div></div></div>'
    +'<div style="position:absolute;top:248px;left:50%;transform:translateX(-50%) rotate(1.5deg);background:#fff;border-radius:16px;padding:13px 18px;box-shadow:0 8px 18px #0002;text-align:center;z-index:4;width:200px"><div style="font-family:'+t.headFont+';font-weight:700;font-size:19px;line-height:1.15;color:'+t.headColor+'">'+accentify(t.caseUpper?c.h.toUpperCase():c.h,t)+'</div></div>'
    +'<div style="position:absolute;left:24px;right:24px;top:352px;text-align:center;font-size:10.5px;font-weight:700;color:#6b6b5a;z-index:4">'+c.s+'</div>'
    +'<div style="position:absolute;right:14px;bottom:22px;background:'+t.ctaBg+';color:'+t.ctaColor+';font-weight:900;font-size:10.5px;padding:8px 15px;border-radius:18px;z-index:6">📞 '+c.cta.toUpperCase()+'</div>'
};

function pick(arr,not){let v;do{v=arr[Math.floor(Math.random()*arr.length)]}while(arr.length>1&&v===not);return v}

function rollSlot(i){
  const t=BRANDS[curBrand],ang=ANGLES[curAngle];
  const others=slots.filter((s,j)=>j!==i);
  const sig=t.sig||[];
  let layout,tries=0;
  do{
    if(i===0&&sig.length&&tries<3)layout=sig[0];
    else if(Math.random()<0.5&&sig.length)layout=pick(sig);
    else layout=pick(LAYOUTS);
    tries++;
  }while(others.some(o=>o.layout===layout)&&tries<20);
  const copy=pick(ang.copy,slots[i].copy);
  slots[i]={layout,copy,cta:pick(ang.cta)};
}
function render(){
  const t=BRANDS[curBrand];
  $('rules').textContent=t.rules+(t.draft?'  ·  ⚠ palette DRAFT — kalibrasi pakai static asli':'');
  $('grid').innerHTML=slots.map((s,i)=>{
    if(!s.copy)return '';
    const c={h:s.copy.h,s:s.copy.s,cta:s.cta};
    return '<div class="slot"><div class="tagline">'+s.layout.toUpperCase()+'</div><div class="card">'+RENDER[s.layout](t,c)+'</div><div class="slotbtns"><button class="mini" onclick="reroll('+i+')">🎲 ulang</button><button class="mini" onclick="copySpec('+i+')">📋 copy spec</button></div></div>';
  }).join('');
}
function reroll(i){rollSlot(i);render()}
function shuffleAll(){slots=[{},{},{}];for(let i=0;i<3;i++)rollSlot(i);render()}
function copySpec(i){
  const s=slots[i],t=BRANDS[curBrand];
  const txt='BRAND: '+t.name+'\nLAYOUT: '+s.layout+'\nHEADLINE: '+s.copy.h+'\nSUB: '+s.copy.s+'\nCTA: '+s.cta+'\nRULES: '+t.rules;
  navigator.clipboard.writeText(txt).then(()=>{const o=$('toast');o.textContent='✓ Spec ke-copy — paste di PS/AI';o.style.display='block';setTimeout(()=>o.style.display='none',1800)});
}
$('photo').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  if(photoURL)URL.revokeObjectURL(photoURL);
  photoURL=URL.createObjectURL(f);
  $('phName').textContent='🖼 '+f.name;
  render();e.target.value='';
});

$('brands').innerHTML=Object.keys(BRANDS).map(k=>'<span class="chip'+(BRANDS[k].draft?' draft':'')+'" id="b_'+k+'" onclick="setBrand(\''+k+'\')">'+BRANDS[k].name+'</span>').join('');
$('angles').innerHTML=Object.keys(ANGLES).map(k=>'<span class="chip" id="a_'+k+'" onclick="setAngle(\''+k+'\')">'+ANGLES[k].label+'</span>').join('');
function setBrand(k){curBrand=k;document.querySelectorAll('[id^=b_]').forEach(e=>e.classList.toggle('on',e.id==='b_'+k));shuffleAll()}
function setAngle(k){curAngle=k;document.querySelectorAll('[id^=a_]').forEach(e=>e.classList.toggle('on',e.id==='a_'+k));shuffleAll()}
setBrand('kinderkare');setAngle('tour');
</script>
</body>
</html>
